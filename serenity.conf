webdriver {
  driver = chrome
  autodownload = true
  wait.for.timeout = 30000
  timeouts {
    implicitlywait = 5000
  }
  base.url = "http://localhost:3000"
}

chrome {
  switches = "--no-sandbox,--disable-dev-shm-usage,--disable-extensions,--disable-gpu,--window-size=1920,1080"
}

firefox {
  switches = "-headless"
}

serenity {
  take.screenshots = AFTER_EACH_STEP
  report.encoding = UTF-8
  verbose.steps = true
  restart.the.browser.each.scenario = false
  browser.maximized = true
  logging = VERBOSE
}

# Application URLs
ticketing.url = "http://localhost:3000"
admin.url = "http://localhost:3000/admin"

# Test data
test.admin.email = "admin@ticketing.com"
test.admin.password = "Admin123!"

environments {
  default {
    ticketing.url = "http://localhost:3000"
    admin.url = "http://localhost:3000/admin"
    test.admin.email = "admin@ticketing.com"
    test.admin.password = "Admin123!"
  }
  
  staging {
    ticketing.url = "https://staging.ticketing.com"
  }
  
  production {
    ticketing.url = "https://ticketing.com"
  }
}